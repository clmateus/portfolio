{% extends 'base.html' %}
{% block title %}{{ project.title }} | Mateus Costa{% endblock %}
{% block content %}
    <h1>{{ project.title }}</h1>
    <section>
        <h2>Detalhes do projeto</h2>
        <p>{{ project.description }}</p>
        <ul>
            {% for tech in project.techstack %}
            <li> {{ tech }}</li>
            {% endfor %}
        </ul>
        <a href="{{ project.url }}" target="_blank">Veja no Github</a>
    </section>
{% endblock %}
